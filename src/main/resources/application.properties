spring.application.name=springaicrud

# Server
server.port=${PORT:8080}
spring.main.allow-circular-references=false
# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/springai_db
spring.datasource.username=postgres
spring.datasource.password=sutharsan
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Ollama (Spring AI)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3
spring.ai.ollama.chat.options.temperature=0.7

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.images-dir=src/main/resources/images

server.error.include-message=always

jwt.secret=springaicrud_super_secret_key_2026_secure
jwt.expiration=86400000