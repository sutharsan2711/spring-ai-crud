services:
  - type: web
    name: springaicrud
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/springaicrud-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
    plan: free
    region: singapore